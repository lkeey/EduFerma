name: Telegram Production Acceptance

on:
  workflow_dispatch:
    inputs:
      operation:
        description: Read status or run the guarded send/idempotency check
        required: true
        default: status
        type: choice
        options:
          - status
          - send
          - recover
      confirmation:
        description: Enter the exact confirmation required by send or recover
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: telegram-production-acceptance
  cancel-in-progress: false

jobs:
  send-owner-private-acceptance:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Validate explicit confirmation
        env:
          OPERATION: ${{ inputs.operation }}
          CONFIRMATION: ${{ inputs.confirmation }}
        run: |
          test "$OPERATION" = "status" || test "$OPERATION" = "send" || test "$OPERATION" = "recover"
          if test "$OPERATION" = "send"; then
            test "$CONFIRMATION" = "SEND ONE PRIVATE OWNER TELEGRAM"
          fi
          if test "$OPERATION" = "recover"; then
            test "$CONFIRMATION" = "RETRY CONFIRMED FAILED PRIVATE TELEGRAM"
          fi
      - name: Inspect state or verify one private owner delivery
        env:
          OPERATION: ${{ inputs.operation }}
          CONFIRMATION: ${{ inputs.confirmation }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          test -n "$CRON_SECRET"
          if test "$OPERATION" = "status"; then
            api_operation="telegram_acceptance_status"
          elif test "$OPERATION" = "recover"; then
            api_operation="telegram_acceptance_recover_failed"
          else
            api_operation="telegram_acceptance"
          fi
          payload="$(jq --null-input --compact-output \
            --arg operation "$api_operation" \
            --arg confirmation "$CONFIRMATION" \
            '{operation: $operation, confirmation: $confirmation}')"
          response_file="$(mktemp)"
          http_status="$(curl --show-error --silent --max-time 60 \
            --output "$response_file" \
            --write-out '%{http_code}' \
            --request POST \
            --header "Authorization: Bearer $CRON_SECRET" \
            --header "Content-Type: application/json" \
            --data "$payload" \
            "https://edu-ferma-web.vercel.app/api/v1/internal/publications/process")"
          response="$(<"$response_file")"
          rm -f "$response_file"
          printf '%s\n' "$response"
          test "$http_status" -ge 200
          test "$http_status" -lt 300
          if test "$OPERATION" = "status"; then
            printf '%s\n' "$response" | jq --exit-status '
              .ok == true and
              (.acceptanceState.postExists | type == "boolean") and
              (.acceptanceState.botIdentity.username | type == "string") and
              (.acceptanceState.privateChatAccess.ok | type == "boolean")
            '
            exit 0
          fi
          printf '%s\n' "$response" | jq --exit-status '
            .ok == true and
            .failedCount == 0 and
            .acceptance.sentDeliveryCount == 1 and
            (.acceptance.providerMessageId | type == "string" and length > 0) and
            (.acceptance.mode == "sent-and-verified" or
             .acceptance.mode == "recovered-and-verified" or
             .acceptance.mode == "already-sent")
          '
