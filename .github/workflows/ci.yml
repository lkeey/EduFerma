name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  repo-governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements-dev.txt
      - run: python scripts/repo_governance_harness.py --mode check

  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements-dev.txt
      - run: python -m ruff check scripts tests
      - run: python -m ruff format --check scripts tests
      - run: python -m unittest tests/test_repo_governance_harness.py
      - run: python -m pytest
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: python-reports
          path: reports/

  platform-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm api:openapi:generate
      - run: pnpm api:openapi:check
      - run: pnpm api:governance
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm web:self-review

  platform-build:
    runs-on: ubuntu-latest
    needs: platform-quality
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  quality-gate:
    runs-on: ubuntu-latest
    needs:
      - repo-governance
      - python-tests
      - platform-quality
      - platform-build
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements-dev.txt
      - run: python scripts/run_quality_gate.py --include-repo-governance --skip-node
